<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
        <title>Recipe Studio</title>
    </head>
    <body>
        <!-- Toggle Dark/Light mode -->
        <input type="checkbox" id="dark-toggle">
        <!-- Header and Nav Bar -->
        <header>
            <nav aria-label="navigation">
                <div class="nav-brand">T&J Recipe Studio</div>
                <div class="nav-links">
                    <a href="index.html" class="nav-active">Home</a>
                    <a href="recipes.html">Recipes</a>
                    <a href="about.html">About</a>
                    <label for="dark-toggle" class="mode-label mode-btn">
                        <span class="light-mode">Dark Mode</span>
                        <span class="dark-mode">Light Mode</span>
                    </label>
                </div>
            </nav>
            <h1>Welcome to T&J Recipe Studio</h1>
            <p>Find easy, tasty recipes and enjoy a clean cooking experience.</p>
        </header>
        <!-- Main content -->
        <main>
            <!-- Main Header -->
            <h2 id="main-explore-btn">
                <a href="recipes.html">Start Exploring Recipes</a>
            </h2>
            <!-- Main Section -->
            <section id="main-explore-section">
                <!-- Main Card Recipes -->
                <div id="main-recipes">
                    <article class="main-recipe-card">
                        <a><img src="assets/sandwich.png" alt="Egg Sandwich"></a>
                        <h3>Egg Sandwich</h3>
                    </article>

                    <article class="main-recipe-card">
                        <a><img src="assets/spaghetti.png" alt="Spaghetti w Meatballs"></a>
                        <h3>Spaghetti w Meatballs</h3>
                    </article>
    
                    <article class="main-recipe-card">
                        <a><img src="assets/pasta.png" alt="Chicken Alfredo Pasta"></a>
                        <h3>Chicken Alfredo Pasta</h3>
                    </article>
    
                    <article class="main-recipe-card">
                        <a><img src="assets/mac.png" alt="Mac and Cheese"></a>
                        <h3>Mac and Cheese</h3>
                    </article>
                </div>
            </section>
        </main>
        <!-- Footer -->
        <footer>
            <p>2026 T&J Recipe Studio</p>
        </footer>
    </body>
</html>
